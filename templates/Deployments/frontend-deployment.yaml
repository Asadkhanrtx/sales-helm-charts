apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.salesUi.name }}
  namespace: {{ .Values.namespaces.application }}
  labels:
    app: sales-ui 
spec:
  replicas: {{ .Values.salesUi.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: sales-ui
  template:
    metadata:
      labels:
        app: sales-ui
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "backend-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/backend"
        vault.hashicorp.com/agent-inject-template-config: |
          {{ "{{- with secret \"secret/data/backend\" -}}" }}
          API_URL={{ "{{ .Data.data.API_URL }}" }}
          {{ "{{- end }}" }}
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: sales-ui-container
          image: {{ .Values.salesUi.image.repository }}:{{ .Values.salesUi.image.tag }}
          ports:
            - containerPort: {{ .Values.salesUi.port }}
          resources:
            requests:
              cpu: {{ .Values.salesUi.resources.requests.cpu }}
              memory: {{ .Values.salesUi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.salesUi.resources.limits.cpu }}
              memory: {{ .Values.salesUi.resources.limits.memory }}

          env:
            - name: VAULT_CONFIG_PATH
              value: /vault/secrets/config

          envFrom:
            - configMapRef:
                name: {{ .Values.configmaps.frontend.name }}