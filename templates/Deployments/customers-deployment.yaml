apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.customer.name }}
  namespace: {{ .Values.namespaces.application }}
  labels:
    app: customers
spec:
  replicas: {{ .Values.customer.replicaCount }}
  selector:
    matchLabels:
      app: customers-microservice
  template:
    metadata:
      labels:
        app: customers-microservice
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "backend-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/backend"
        vault.hashicorp.com/agent-inject-template-config: |
          {{ "{{- with secret \"secret/data/backend\" -}}" }}
          DATABASE_URL={{ "{{ .Data.data.DATABASE_URL }}" }}
          JWT_SECRET_KEY={{ "{{ .Data.data.JWT_SECRET_KEY }}" }}
          RABBITMQ_URL={{ "{{ .Data.data.RABBITMQ_URL }}" }}
          ENVIRONMENT={{ "{{ .Data.data.ENVIRONMENT }}" }}
          ACCESS_TOKEN_EXPIRE_MINUTES={{ "{{ .Data.data.ACCESS_TOKEN_EXPIRE_MINUTES }}" }}
          API_URL={{ "{{ .Data.data.API_URL }}" }}
          {{ "{{- end }}" }}
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: customers-container
          image: {{ .Values.customer.image.repository }}:{{ .Values.customer.image.tag }}
          ports:
            - containerPort: {{ .Values.customer.port }}
          env:
            - name: VAULT_CONFIG_PATH
              value: /vault/secrets/config
          envFrom:
            - configMapRef:
                name: {{ .Values.configmaps.backend.name }}