apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.auth.name }}
  namespace: {{ .Values.namespaces.application }}
  labels:
    app: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-microservice
  template:
    metadata:
      labels:
        app: auth-microservice
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "backend-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/backend"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "secret/data/backend" -}}`}}
          DATABASE_URL={{`{{ .Data.data.DATABASE_URL }}`}}
          JWT_SECRET_KEY={{`{{ .Data.data.JWT_SECRET_KEY }}`}}
          RABBITMQ_URL={{`{{ .Data.data.RABBITMQ_URL }}`}}
          ENVIRONMENT={{`{{ .Data.data.ENVIRONMENT }}`}}
          ACCESS_TOKEN_EXPIRE_MINUTES={{`{{ .Data.data.ACCESS_TOKEN_EXPIRE_MINUTES }}`}}
          API_URL={{`{{ .Data.data.API_URL }}`}}
          {{`{{- end }}`}}
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: auth-container
          image: {{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag }}
          ports:
            - containerPort: {{ .Values.auth.port }}

          env:
            - name: VAULT_CONFIG_PATH
              value: /vault/secrets/config

          envFrom:
            - configMapRef:
                name: {{ .Values.configmaps.backend.name }}

          resources:
            limits:
              cpu: {{ .Values.auth.resources.limits.cpu }}
              memory: {{ .Values.auth.resources.limits.memory }}
            requests:
              cpu: {{ .Values.auth.resources.requests.cpu }}
              memory: {{ .Values.auth.resources.requests.memory }}