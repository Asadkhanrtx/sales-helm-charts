apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-rollouts-dashboard-route
  namespace: argo-rollouts
  labels:
    shared-gateway: "true"
spec:
  parentRefs:
    - name: opslora-gateway
      namespace: opslora-gateway-ns
      # OPTIONAL but recommended if your gateway has named listeners
      # sectionName: http

  hostnames:
    - rollout.opslora.com

rules:
  - matches:
      - path:
          type: PathPrefix
          value: /rollouts

    filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: /

    backendRefs:
      - name: argo-rollouts-dashboard
        port: 3100