apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Release.Namespace }}

spec:
  encryptedData:
    RABBITMQ_DEFAULT_USER: <ENCRYPTED>
    RABBITMQ_DEFAULT_PASS: <ENCRYPTED>

  template:
    metadata:
      name: {{ .Values.secretName }}
      namespace: {{ .Release.Namespace }}
    type: Opaque