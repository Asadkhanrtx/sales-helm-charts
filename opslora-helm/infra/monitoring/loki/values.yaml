deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  enabled: true   # 🔴 THIS is often required in newer charts
  replicas: 1
  persistence:
    enabled: true
    storageClass: sales-storageclass
    accessModes:
      - ReadWriteMany
    size: 10Gi

# 🔴 Explicitly disable distributed mode
backend:
  enabled: false
read:
  enabled: false
write:
  enabled: false