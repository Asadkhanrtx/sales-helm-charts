deploymentMode: Distributed

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  compactor:
    working_directory: /var/loki/compactor

  limits_config:
    retention_period: 168h

# 🔥 CRITICAL: persistence must be defined PER component

backend:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 10Gi

write:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 10Gi

read:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 10Gi

ingester:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 20Gi

distributor:
  enabled: true

querier:
  enabled: true

queryFrontend:
  enabled: true

queryScheduler:
  enabled: true

compactor:
  enabled: true
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 10Gi

indexGateway:
  enabled: true
  persistence:
    enabled: true
    storageClassName: sales-storageclass   # ✅ FIX
    accessModes:
      - ReadWriteMany
    size: 10Gi

singleBinary:
  enabled: false

gateway:
  enabled: false

lokiCanary:
  enabled: false

monitoring:
  enabled: false