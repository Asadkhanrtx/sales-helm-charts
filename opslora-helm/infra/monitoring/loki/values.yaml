loki:
  deploymentMode: Distributed

  global:
    storageClass: sales-storageclass


  auth_enabled: false

  commonConfig:
    replication_factor: 1

  ingester:
    enabled: true
    replicas: 1

    lifecycler:
      ring:
        replication_factor: 

    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 20Gi

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  compactor:
    enabled: true
    working_directory: /var/loki/compactor
    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 10Gi

  limits_config:
    retention_period: 168h

  # =========================
  # STATEFUL COMPONENTS
  # =========================

  backend:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 10Gi

  write:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 10Gi

  read:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 10Gi

  indexGateway:
    enabled: true
    persistence:
      enabled: true
      storageClass: sales-storageclass
      accessModes:
        - ReadWriteMany
      size: 10Gi

  # =========================
  # STATELESS COMPONENTS
  # =========================

  distributor:
    enabled: true

  querier:
    enabled: true

  queryFrontend:
    enabled: true

  queryScheduler:
    enabled: true

  # =========================
  # DISABLE UNUSED
  # =========================

  singleBinary:
    enabled: false

  gateway:
    enabled: false

  lokiCanary:
    enabled: false

  monitoring:
    enabled: false

  grafanaAgent:
    enabled: false