deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  enabled: true
  replicas: 1

  persistence:
    enabled: false   # 🔴 disable PVCs completely

  extraVolumes:
    - name: loki-storage
      hostPath:
        path: /tmp/loki   # or /var/lib/loki
        type: DirectoryOrCreate

  extraVolumeMounts:
    - name: loki-storage
      mountPath: /var/loki