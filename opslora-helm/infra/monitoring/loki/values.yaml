deploymentMode: Distributed

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    filesystem:
      directory: /var/loki/chunks

  compactor:
    working_directory: /var/loki/compactor

  limits_config:
    retention_period: 168h  # 7 days

  server:
    http_listen_port: 3100

# ✅ Shared persistence using NFS dynamic provisioning
persistence:
  enabled: true
  storageClass: sales-storageclass
  accessModes:
    - ReadWriteMany
  size: 50Gi

# 🔥 Core distributed components

distributor:
  enabled: true
  replicas: 1

ingester:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClass: sales-storageclass
    accessModes:
      - ReadWriteMany
    size: 20Gi

querier:
  enabled: true
  replicas: 1

queryFrontend:
  enabled: true
  replicas: 1

queryScheduler:
  enabled: true

compactor:
  enabled: true
  persistence:
    enabled: true
    storageClass: sales-storageclass
    accessModes:
      - ReadWriteMany
    size: 10Gi

indexGateway:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClass: sales-storageclass
    accessModes:
      - ReadWriteMany
    size: 10Gi

# 🔴 Required logical groupings for chart

read:
  enabled: true
  replicas: 1

write:
  enabled: true
  replicas: 1

backend:
  enabled: true
  replicas: 1

# ❌ Disable single binary
singleBinary:
  enabled: false

# ❌ Disable extras
gateway:
  enabled: false

lokiCanary:
  enabled: false

monitoring:
  enabled: false