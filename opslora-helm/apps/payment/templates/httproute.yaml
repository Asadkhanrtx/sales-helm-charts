apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "payment.fullname" . }}
  labels:
    {{- include "payment.labels" . | nindent 4 }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}

  {{- $defaultHost := .Values.global.host }}
  {{- $hostnames := .Values.route.hostnames | default (list $defaultHost) }}
  hostnames:
    {{- range $hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.route.path.type }}
            value: {{ .Values.route.path.value }}

      backendRefs:
        - name: {{ .Values.route.backend.name | default (include "payment.fullname" .) }}
          port: {{ .Values.route.backend.port | default .Values.service.port }}
