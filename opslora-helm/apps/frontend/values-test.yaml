replicaCount: 2

image:
  repository: ghcr.io/kube-pod404/opslora-frontend-service
  pullPolicy: IfNotPresent
  tag: "5ff299e"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
  - name: opslora-gateway
    namespace: opslora-gateway-ns
    sectionName: http
  hostnames:
  - test-opslora.opslora.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /