apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.fullname" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}
