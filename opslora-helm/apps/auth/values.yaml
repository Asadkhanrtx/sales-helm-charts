name: auth
fullname: auth-service

labels:
  app: auth
  component: backend

selectorLabels:
  app: auth

serviceAccount:
  create: true
  name: auth-sa

replicaCount: 2

image:
  repository: your-docker-repo/auth
  tag: "1.2.2"
  pullPolicy: IfNotPresent

containerPort: 8000

secretName: auth-secret

service:
  name: auth-service
  port: 80
  labels:
    app: auth
  selectorLabels:
    app: auth

gateway:
  name: main-gateway
  namespace: infra

route:
  hostnames:
    - auth.example.com
  path:
    type: PathPrefix
    value: /auth
  backend:
    name: ""   
    port: 80

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

pod:
  automountServiceAccountToken: false

affinity:
  enabled: false

probes:
  startup:
    enabled: true
    path: /health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 10

  readiness:
    enabled: true
    path: /health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

  liveness:
    enabled: true
    path: /health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3