apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "auth.fullname" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}

  hostnames:
    {{- range .Values.route.hostnames }}
    - {{ . | quote }}
    {{- end }}

  rules:
    - matches:
        - path:
            type: {{ .Values.route.path.type }}
            value: {{ .Values.route.path.value }}

      backendRefs:
        - name: {{ .Values.route.backend.name | default (include "auth.fullname" .) }}
          port: {{ .Values.route.backend.port | default .Values.service.port }}