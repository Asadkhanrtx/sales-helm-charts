apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "auth.fullname" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.global.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth

      backendRefs:
        - name: {{ include "auth.fullname" . }}
          port: {{ .Values.service.port }}