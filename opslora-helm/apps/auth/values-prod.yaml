fullname: auth-service

replicaCount: 2

image:
  tag: "v1.0.0"

serviceAccount:
  name: auth-sa

route:
  hostnames:
    - opslora.com

resources:
  requests:
    cpu: 100m
    memory: 150Mi
    ephemeral-storage: 300Mi
  limits:
    cpu: 200m     
    memory: 300Mi
    ephemeral-storage: 500Mi

strategy:
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

probes:
  readiness:
    failureThreshold: 3

  liveness:
    failureThreshold: 3

pod:
  automountServiceAccountToken: false

affinity:
  enabled: true
  podAntiAffinity:
    type: preferredDuringSchedulingIgnoredDuringExecution
    weight: 100
    topologyKey: kubernetes.io/hostname

secrets:
  ACCESS_TOKEN_EXPIRE_MINUTES: ""
  API_URL: ""
  DATABASE_URL: ""
  ENVIRONMENT: ""
  JWT_SECRET_KEY: ""
  RABBITMQ_URL: ""
