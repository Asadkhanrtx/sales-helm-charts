apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "order.fullname" . }}
  labels:
    {{- include "order.labels" . | nindent 4 }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}

  hostnames:
    - {{ .Values.global.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/orders

      backendRefs:
        - name: {{ include "order.fullname" . }}
          port: {{ .Values.service.port }}