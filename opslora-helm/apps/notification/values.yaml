replicaCount: 2

image:
  repository: kubectlandchill/opslora-notification-service-test
  tag: "e92bad9"
  pullPolicy: IfNotPresent

containerPort: 3000

rabbitmq:
  host: rabbitmq
  port: 5672

secretName: notification-secret

secrets:
  RABBITMQ_URL: "PLACEHOLDER_RABBITMQ_URL"
  FROM_EMAIL: "PLACEHOLDER_FROM_EMAIL"
  FROM_NAME: "PLACEHOLDER_FROM_NAME"
  SMTP_HOST: "PLACEHOLDER_SMTP_HOST"
  SMTP_PASS: "PLACEHOLDER_SMTP_PASS"
  SMTP_PORT: "PLACEHOLDER_SMTP_PORT"
  SMTP_USER: "PLACEHOLDER_SMTP_USER"

serviceAccount:
  create: true
  name: ""


resources:
  limits:
    cpu: "200m"
    memory: "300Mi"
    ephemeral-storage: "500Mi"
  requests:
    cpu: "100m"
    memory: "150Mi"
    ephemeral-storage: "250Mi"