apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "customer.fullname" . }}
  labels:
    {{- include "customer.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      {{- include "customer.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "customer.selectorLabels" . | nindent 8 }}

    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ include "customer.serviceAccountName" . }}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "customer.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname

      containers:
        - name: customer-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # startupProbe:
          #   httpGet:
          #     path: /api/v1/customers/health
          #     port: {{ .Values.containerPort }}
          #   periodSeconds: 5
          #   timeoutSeconds: 2
          #   failureThreshold: 12  

          readinessProbe:
            httpGet:
              path: /api/v1/customers/health
              port: {{ .Values.containerPort }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/v1/customers/health
              port: {{ .Values.containerPort }}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3