replicaCount: 3

image:
  repository: ghcr.io/kube-pod404/opslora-customer-service
  tag: "a1857c1"
  pullPolicy: IfNotPresent

global:
  host: opslora.com

route:
  hostnames:
    - opslora.com
  path:
    type: PathPrefix
    value: /api/v1/customers
  backend:
    name: ""
    port: 3000


secretName: customer-secret

serviceAccount:
  create: true
  name: ""

pod:
  automountServiceAccountToken: false

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

affinity:
  enabled: true
  podAntiAffinity:
    enabled: true
    type: preferredDuringSchedulingIgnoredDuringExecution
    weight: 100
    topologyKey: kubernetes.io/hostname

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"
    ephemeral-storage: "500Mi"

probes:
  startup:
    enabled: false
    path: /api/v1/customers/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readiness:
    enabled: true
    path: /api/v1/customers/health
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  liveness:
    enabled: true
    path: /api/v1/customers/health
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

secrets:
  ACCESS_TOKEN_EXPIRE_MINUTES: ""
  API_URL: ""
  DATABASE_URL: ""
  ENVIRONMENT: ""
  JWT_SECRET_KEY: ""
  RABBITMQ_URL: ""

serviceName: "customer-service"