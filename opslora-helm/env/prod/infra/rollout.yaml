apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git  # 🔴 change this
    targetRevision: main
    path: argo-rollout-chart   # 🔴 your helm chart folder

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true