apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: test/opslora-helm-test
    path: opslora-helm/infra/rabbitmq
    helm:
      releaseName: rabbitmq-test
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: opslora-app-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
