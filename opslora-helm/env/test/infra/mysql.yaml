apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: refactor/opslora-helm
    path: opslora-helm/infra/mysql
    helm:
      releaseName: mysql-test
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
