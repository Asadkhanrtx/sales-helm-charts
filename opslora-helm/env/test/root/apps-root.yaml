apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-root-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: test/opslora-helm-test
    path: opslora-helm/env/test/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
