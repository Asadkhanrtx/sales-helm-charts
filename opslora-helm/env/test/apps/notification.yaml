apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KUBE-POD404/opslora-helm-charts.git
    targetRevision: refactor/opslora-helm
    path: opslora-helm/apps/notification
    helm:
      releaseName: notification-service-test
      valueFiles:
        - values.yaml
        - values-test.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: opslora-app-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true