apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "order.fullname" . }}
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "order.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      {{- include "order.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "order.selectorLabels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ include "order.serviceAccountName" . }}

      containers:
        - name: order
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          envFrom:
            - secretRef:
                name: {{ default (printf "%s-secret" (include "order.fullname" .)) .Values.existingSecret }}
            - configMapRef:
                name: {{ include "order.fullname" . }}-config

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /api/v1/orders/health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/v1/orders/health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20