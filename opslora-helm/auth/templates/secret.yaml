{{- if and .Values.secret.enabled (not .Values.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth.fullname" . }}-secret
  labels:
    {{- include "auth.labels" . | nindent 4 }}

type: Opaque

stringData:
{{- range $key, $value := .Values.secret.data }}
  {{ $key }}: "{{ $value }}"
{{- end }}
{{- end }}