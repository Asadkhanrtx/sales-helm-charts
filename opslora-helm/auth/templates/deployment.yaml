apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auth.fullname" . }}
  labels:
    {{- include "auth.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      {{- include "auth.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "auth.selectorLabels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ include "auth.serviceAccountName" . }}

      containers:
        - name: auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          envFrom:
            - secretRef:
                name: {{ default (printf "%s-secret" (include "auth.fullname" .)) .Values.existingSecret }}
            - configMapRef:
                name: {{ include "auth.fullname" . }}-config

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20